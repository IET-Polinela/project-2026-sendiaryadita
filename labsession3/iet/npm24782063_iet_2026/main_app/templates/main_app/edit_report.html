<!DOCTYPE html>
<html>
<head>
    <title>Edit Laporan</title>
    <style>
        :root {
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --primary: #0f766e;
            --primary-dark: #115e59;
            --border: #dbe4f0;
            --shadow: 0 18px 40px rgba(15, 23, 42, 0.10);
            --radius: 22px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top right, rgba(13, 148, 136, 0.16), transparent 26%),
                linear-gradient(135deg, #eef6ff 0%, #f8fbff 50%, #f2fcf8 100%);
            padding: 24px;
        }

        .page {
            max-width: 760px;
            margin: 0 auto;
        }

        .card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 36px;
        }

        h1 {
            margin: 0 0 10px;
            font-size: clamp(2rem, 4vw, 2.8rem);
            line-height: 1.15;
        }

        .subtitle {
            margin: 0 0 28px;
            color: var(--muted);
            line-height: 1.7;
        }

        form p {
            margin: 0 0 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font: inherit;
            background: #fbfdff;
        }

        textarea {
            min-height: 140px;
            resize: vertical;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #14b8a6;
            box-shadow: 0 0 0 4px rgba(45, 212, 191, 0.14);
        }

        button {
            border: 0;
            border-radius: 14px;
            background: var(--primary);
            color: #ffffff;
            padding: 14px 22px;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
        }

        button:hover {
            background: var(--primary-dark);
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: var(--primary-dark);
            text-decoration: none;
            font-weight: 700;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 640px) {
            .card {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <section class="card">
            <h1>Edit Laporan Masalah Kampus</h1>
            <p class="subtitle">
                Perbarui data laporan <strong>{{ report.title }}</strong> jika ada informasi yang perlu diperbaiki.
            </p>

            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit">Simpan Perubahan</button>
            </form>

            <a class="back-link" href="{% url 'report_list' %}">Kembali ke Daftar Laporan</a>
        </section>
    </main>
</body>
</html>
