<!DOCTYPE html>
<html>
<head>
    <title>Hapus Laporan</title>
    <style>
        :root {
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --danger: #b91c1c;
            --danger-dark: #991b1b;
            --shadow: 0 18px 40px rgba(15, 23, 42, 0.10);
            --radius: 22px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top right, rgba(239, 68, 68, 0.12), transparent 22%),
                linear-gradient(135deg, #fff7f7 0%, #fffefe 50%, #f8fbff 100%);
            padding: 24px;
        }

        .page {
            max-width: 640px;
            margin: 48px auto;
        }

        .card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 36px;
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(2rem, 4vw, 2.6rem);
            line-height: 1.15;
        }

        p {
            color: var(--muted);
            line-height: 1.7;
        }

        .actions {
            margin-top: 24px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        button,
        .cancel-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 18px;
            border-radius: 14px;
            font: inherit;
            font-weight: 700;
            text-decoration: none;
        }

        button {
            border: 0;
            background: var(--danger);
            color: #ffffff;
            cursor: pointer;
        }

        button:hover {
            background: var(--danger-dark);
        }

        .cancel-link {
            background: #f3f4f6;
            color: var(--text);
        }

        .cancel-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <main class="page">
        <section class="card">
            <h1>Hapus Laporan</h1>
            <p>
                Apakah kamu yakin ingin menghapus laporan <strong>{{ report.title }}</strong>?
                Tindakan ini tidak dapat dibatalkan.
            </p>

            <form method="post">
                {% csrf_token %}
                <div class="actions">
                    <button type="submit">Ya, Hapus Laporan</button>
                    <a class="cancel-link" href="{% url 'report_list' %}">Batal</a>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
