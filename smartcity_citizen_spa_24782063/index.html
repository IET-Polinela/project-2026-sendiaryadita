<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Warga - Smart City Tracker</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap"
        rel="stylesheet"
    >

    <style>
        :root {
            --brand-primary: #087f5b;
            --brand-primary-dark: #064d39;
            --brand-accent: #d99a32;
            --brand-ink: #10231f;
            --brand-muted: #65756f;
            --surface: rgba(255, 255, 255, 0.96);
            --surface-soft: #f4f8f6;
            --border-soft: rgba(16, 35, 31, 0.11);
            --shadow-soft: 0 20px 56px rgba(7, 20, 17, 0.12);
            --nav-bg: rgba(8, 19, 16, 0.94);
        }

        body {
            min-height: 100vh;
            color: var(--brand-ink);
            font-family: "Manrope", "Segoe UI", sans-serif;
            background:
                linear-gradient(180deg, rgba(6, 16, 13, 0.94) 0%, rgba(6, 16, 13, 0.86) 17rem, transparent 17rem),
                linear-gradient(135deg, #e7f2ec 0%, #f6faf7 100%);
            background-attachment: fixed;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6,
        .navbar-brand {
            font-family: "Plus Jakarta Sans", "Segoe UI", sans-serif;
        }

        .app-navbar {
            background: var(--nav-bg);
            backdrop-filter: blur(18px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 16px 42px rgba(7, 20, 17, 0.18);
        }

        .navbar-brand {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            line-height: 1;
        }

        .brand-mark {
            align-items: center;
            background: linear-gradient(135deg, var(--brand-primary), var(--brand-accent));
            border-radius: 14px;
            color: #ffffff;
            display: inline-flex;
            height: 42px;
            justify-content: center;
            width: 42px;
            box-shadow: 0 14px 26px rgba(8, 127, 91, 0.22);
        }

        .brand-title {
            display: block;
            color: #ffffff;
            font-size: 1.12rem;
            font-weight: 800;
            letter-spacing: 0.02em;
        }

        .brand-subtitle {
            display: block;
            margin-top: 0.2rem;
            color: rgba(255, 255, 255, 0.68);
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .navbar-actions {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .app-nav-link,
        .nav-link-button {
            border: 0;
            border-radius: 999px;
            color: rgba(255, 255, 255, 0.84);
            font-weight: 700;
            padding: 0.7rem 1rem;
            text-decoration: none;
        }

        .app-nav-link:hover,
        .app-nav-link:focus,
        .nav-link-button:hover,
        .nav-link-button:focus {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
        }

        .nav-link-button {
            background: transparent;
        }

        .user-chip {
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.9);
            font-weight: 800;
            padding: 0.7rem 1rem;
        }

        .spa-container {
            width: min(1320px, calc(100% - 2rem));
            min-height: calc(100vh - 74px);
            margin: 0 auto;
            padding: 2.4rem 0 3rem;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border-soft) !important;
            border-radius: 20px;
            box-shadow: var(--shadow-soft) !important;
        }

        .form-control {
            min-height: 52px;
            border-color: rgba(8, 127, 91, 0.18);
            border-radius: 12px;
            padding: 0.85rem 1rem;
        }

        .form-control:focus {
            border-color: rgba(8, 127, 91, 0.48);
            box-shadow: 0 0 0 0.28rem rgba(8, 127, 91, 0.12);
        }

        .btn {
            border-radius: 12px;
            font-weight: 800;
            padding: 0.78rem 1.1rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--brand-primary), var(--brand-primary-dark));
            border-color: transparent;
            box-shadow: 0 10px 24px rgba(8, 127, 91, 0.2);
        }

        .btn-primary:hover,
        .btn-primary:focus {
            background: linear-gradient(135deg, #076c4e, #043d2d);
            border-color: transparent;
        }

        .text-muted {
            color: var(--brand-muted) !important;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            border: 1px solid transparent;
            border-radius: 999px;
            font-size: 0.78rem;
            font-weight: 800;
            letter-spacing: 0.02em;
            padding: 0.48rem 0.78rem;
        }

        .status-draft {
            background: rgba(8, 127, 91, 0.1);
            border-color: rgba(8, 127, 91, 0.2);
            color: var(--brand-primary-dark);
        }

        .status-reported {
            background: #edf1f3;
            border-color: #dce5e9;
            color: #52626c;
        }

        .status-verified {
            background: #dff4f4;
            border-color: #c8eaea;
            color: #0f6a6c;
        }

        .status-progress {
            background: #fff1d8;
            border-color: #f3ddad;
            color: #9a630d;
        }

        .status-resolved {
            background: #def5e6;
            border-color: #c9ead5;
            color: #25683b;
        }

        @media (max-width: 767.98px) {
            .spa-container {
                width: min(100% - 1rem, 100%);
                padding-top: 1.25rem;
            }

            .navbar-actions {
                gap: 0.35rem;
            }

            .brand-subtitle {
                display: none;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark app-navbar sticky-top">
        <div class="container-fluid px-3 px-lg-4 px-xl-5">
            <a class="navbar-brand" href="#dashboard">
                <span class="brand-mark"><i class="bi bi-buildings"></i></span>
                <span>
                    <span class="brand-title">KANADA CITY</span>
                    <span class="brand-subtitle">Citizen Portal</span>
                </span>
            </a>

            <div id="nav-menus" class="navbar-actions ms-auto"></div>
        </div>
    </nav>

    <main class="spa-container" id="app-content"></main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/router.js"></script>
</body>
</html>
