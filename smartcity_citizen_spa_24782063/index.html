<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lampung Tanggap - Portal Aspirasi Warga</title>
    <meta name="theme-color" content="#102c2a">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap"
        rel="stylesheet"
    >

    <style>
        :root {
            --bs-primary: #0b6b5b;
            --bs-primary-rgb: 11, 107, 91;
            --brand-primary: #0b6b5b;
            --brand-primary-dark: #103c37;
            --brand-gold: #d7a638;
            --brand-coral: #c85c4a;
            --ink: #172522;
            --muted: #687a75;
            --canvas: #f3f6f5;
            --surface: #ffffff;
            --surface-soft: #edf3f1;
            --line: #dce5e2;
            --nav: #102c2a;
            --shadow-sm: 0 8px 24px rgba(22, 45, 40, 0.08);
            --shadow-md: 0 18px 50px rgba(22, 45, 40, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            color: var(--ink);
            font-family: "Manrope", "Segoe UI", sans-serif;
            background: var(--canvas);
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6,
        .navbar-brand {
            font-family: "Plus Jakarta Sans", "Segoe UI", sans-serif;
        }

        .app-navbar {
            min-height: 70px;
            background: var(--nav);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 24px rgba(10, 31, 28, 0.18);
        }

        .navbar-brand {
            display: inline-flex;
            align-items: center;
            gap: 0.7rem;
            line-height: 1;
            text-decoration: none;
        }

        .brand-mark {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            flex: 0 0 40px;
            color: #17322e;
            background: var(--brand-gold);
            border-radius: 8px;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.3);
        }

        .brand-title {
            display: block;
            color: #ffffff;
            font-size: 1.08rem;
            font-weight: 800;
        }

        .brand-subtitle {
            display: block;
            margin-top: 0.28rem;
            color: rgba(255, 255, 255, 0.62);
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .navbar-actions {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .app-nav-link,
        .nav-link-button,
        .user-chip {
            display: inline-flex;
            align-items: center;
            min-height: 40px;
            padding: 0.58rem 0.82rem;
            border: 1px solid transparent;
            border-radius: 8px;
            color: rgba(255, 255, 255, 0.82);
            font-size: 0.9rem;
            font-weight: 700;
            text-decoration: none;
        }

        .app-nav-link:hover,
        .app-nav-link:focus,
        .nav-link-button:hover,
        .nav-link-button:focus {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .nav-link-button {
            background: transparent;
        }

        .user-chip {
            color: #17322e;
            background: var(--brand-gold);
        }

        .spa-container {
            width: min(1480px, calc(100% - 2rem));
            min-height: calc(100vh - 70px);
            margin: 0 auto;
            padding: 1.6rem 0 3rem;
        }

        .text-muted {
            color: var(--muted) !important;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--line) !important;
            border-radius: 8px;
            box-shadow: var(--shadow-sm) !important;
        }

        .btn {
            min-height: 44px;
            border-radius: 8px;
            font-weight: 800;
            padding: 0.7rem 1rem;
        }

        .btn-primary {
            background: var(--brand-primary);
            border-color: var(--brand-primary);
            box-shadow: 0 8px 18px rgba(11, 107, 91, 0.18);
        }

        .btn-primary:hover,
        .btn-primary:focus {
            background: #08594c;
            border-color: #08594c;
        }

        .btn-warning {
            color: #3c2b00;
            background: var(--brand-gold);
            border-color: var(--brand-gold);
        }

        .form-control {
            min-height: 48px;
            padding: 0.75rem 0.9rem;
            color: var(--ink);
            background: #ffffff;
            border: 1px solid #ccd9d5;
            border-radius: 8px;
        }

        .form-control:focus {
            border-color: var(--brand-primary);
            box-shadow: 0 0 0 0.2rem rgba(11, 107, 91, 0.12);
        }

        textarea.form-control {
            min-height: 112px;
        }

        .form-label {
            margin-bottom: 0.45rem;
            color: var(--ink);
            font-size: 0.88rem;
            font-weight: 800;
        }

        .auth-shell {
            display: grid;
            grid-template-columns: minmax(0, 1.05fr) minmax(420px, 0.95fr);
            min-height: calc(100vh - 118px);
            overflow: hidden;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: var(--shadow-md);
        }

        .auth-visual {
            position: relative;
            display: flex;
            align-items: end;
            min-height: 640px;
            padding: 2.5rem;
            color: #ffffff;
            background-image:
                linear-gradient(180deg, rgba(11, 36, 32, 0.05) 18%, rgba(9, 31, 28, 0.88) 100%),
                url("assets/lampung-panorama.webp");
            background-position: center;
            background-size: cover;
        }

        .auth-visual-content {
            max-width: 620px;
        }

        .auth-kicker,
        .workspace-kicker {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            margin-bottom: 0.9rem;
            color: var(--brand-gold);
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .auth-visual h1 {
            max-width: 680px;
            margin-bottom: 0.85rem;
            font-size: clamp(2rem, 3vw, 3.5rem);
            font-weight: 800;
            line-height: 1.12;
        }

        .auth-visual p {
            max-width: 580px;
            margin-bottom: 0;
            color: rgba(255, 255, 255, 0.78);
            font-size: 1rem;
            line-height: 1.7;
        }

        .auth-panel {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem;
            background: #ffffff;
        }

        .auth-form-wrap {
            width: min(100%, 490px);
        }

        .auth-form-wrap.register-wrap {
            width: min(100%, 620px);
        }

        .auth-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            height: 42px;
            margin-bottom: 1rem;
            color: #ffffff;
            background: var(--brand-primary);
            border-radius: 8px;
        }

        .auth-heading {
            margin-bottom: 0.45rem;
            font-size: 1.7rem;
            font-weight: 800;
        }

        .auth-subheading {
            margin-bottom: 1.7rem;
            color: var(--muted);
            line-height: 1.55;
        }

        .auth-switch {
            padding-top: 1rem;
            margin-top: 1.5rem;
            border-top: 1px solid var(--line);
            color: var(--muted);
            text-align: center;
        }

        .auth-switch a {
            color: var(--brand-primary);
        }

        .dashboard-header {
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 1.5rem;
            margin-bottom: 1.4rem;
        }

        .dashboard-header h1 {
            margin-bottom: 0.4rem;
            font-size: clamp(1.65rem, 2.5vw, 2.35rem);
            font-weight: 800;
        }

        .dashboard-header p {
            max-width: 720px;
            margin-bottom: 0;
            color: var(--muted);
        }

        .service-state {
            display: inline-flex;
            align-items: center;
            gap: 0.55rem;
            flex: 0 0 auto;
            padding: 0.65rem 0.85rem;
            color: #195b43;
            background: #e4f4eb;
            border: 1px solid #bedfce;
            border-radius: 8px;
            font-size: 0.82rem;
            font-weight: 800;
        }

        .service-state::before {
            width: 8px;
            height: 8px;
            content: "";
            background: #24865f;
            border-radius: 50%;
            box-shadow: 0 0 0 4px rgba(36, 134, 95, 0.12);
        }

        .dashboard-shell {
            align-items: flex-start;
        }

        .sidebar-card {
            overflow: hidden;
        }

        .sidebar-card .card-body {
            padding: 1rem;
        }

        .new-report-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 50px;
        }

        .sidebar-heading {
            margin-top: 0.3rem;
            color: var(--muted);
            font-size: 0.72rem;
            letter-spacing: 0.08em;
        }

        .status-row {
            min-height: 46px;
            color: var(--ink);
            font-size: 0.88rem;
            font-weight: 700;
        }

        .status-row i {
            display: inline-block;
            width: 20px;
        }

        .status-row .badge {
            min-width: 28px;
            padding: 0.4rem 0.5rem;
        }

        .sidebar-note {
            padding: 0.9rem;
            margin-top: 1rem;
            color: #6b5116;
            background: #fff7df;
            border: 1px solid #ead7a0;
            border-radius: 8px;
            font-size: 0.78rem;
            line-height: 1.5;
        }

        .reports-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .dashboard-tabs {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.28rem;
            background: #e5ece9;
            border: 0;
            border-radius: 8px;
        }

        .dashboard-tabs .nav-link {
            min-height: 42px;
            padding: 0.68rem 0.9rem;
            color: #52645f;
            background: transparent;
            border: 0;
            border-radius: 6px;
            font-size: 0.88rem;
        }

        .dashboard-tabs .nav-link:hover {
            color: var(--ink);
        }

        .dashboard-tabs .nav-link.active {
            color: var(--brand-primary-dark);
            background: #ffffff;
            box-shadow: 0 3px 10px rgba(27, 55, 49, 0.08);
        }

        .toolbar-context {
            color: var(--muted);
            font-size: 0.8rem;
            font-weight: 700;
        }

        .reports-grid {
            align-items: stretch;
        }

        .report-card {
            height: 100%;
            overflow: hidden;
            transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
        }

        .report-card::before {
            display: block;
            width: 100%;
            height: 3px;
            content: "";
            background: var(--brand-primary);
        }

        .report-card:hover {
            border-color: #b9ccc6 !important;
            box-shadow: var(--shadow-md) !important;
            transform: translateY(-2px);
        }

        .report-card .card-body {
            display: flex;
            flex-direction: column;
            padding: 1.2rem;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            min-height: 30px;
            padding: 0.38rem 0.65rem;
            border: 1px solid transparent;
            border-radius: 999px;
            font-size: 0.7rem;
            font-weight: 800;
        }

        .status-draft {
            color: #36414a;
            background: #e9edf0;
            border-color: #b9c3ca;
        }

        .status-reported {
            color: #725000;
            background: #fff3c8;
            border-color: #e8bd3a;
        }

        .status-verified {
            color: #075567;
            background: #d8f3f7;
            border-color: #5cc5d5;
        }

        .status-progress {
            color: #81420c;
            background: #ffe7d0;
            border-color: #ef9a4b;
        }

        .status-resolved {
            color: #165b3d;
            background: #daf0e3;
            border-color: #62b487;
        }

        .report-title {
            color: #14231f;
            font-size: 1.08rem;
            line-height: 1.35;
        }

        .report-description {
            min-height: 3.2rem;
            color: #5f706b !important;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .report-meta {
            padding-top: 0.9rem;
            margin-top: auto;
            border-top: 1px solid var(--line);
            font-size: 0.86rem;
        }

        .progress {
            height: 7px;
            overflow: hidden;
            background: #e6ecea;
            border-radius: 999px;
        }

        .progress-bar {
            border-radius: 999px;
        }

        .progress-draft,
        .status-count-draft {
            background-color: #78858d;
        }

        .progress-reported,
        .status-count-reported {
            background-color: #e8b51b;
        }

        .progress-verified,
        .status-count-verified {
            background-color: #20abc0;
        }

        .progress-in-progress,
        .status-count-process {
            background-color: #ed7b24;
        }

        .progress-resolved,
        .status-count-done {
            background-color: #24865f;
        }

        .status-count-draft,
        .status-count-done {
            color: #ffffff;
        }

        .status-count-reported,
        .status-count-verified,
        .status-count-process {
            color: #172522;
        }

        .pagination {
            gap: 0.25rem;
        }

        .pagination .page-link {
            min-width: 40px;
            min-height: 40px;
            color: var(--brand-primary-dark);
            border-color: var(--line);
            border-radius: 6px !important;
            font-size: 0.84rem;
            font-weight: 700;
        }

        .pagination .page-item.active .page-link {
            color: #ffffff;
            background: var(--brand-primary);
            border-color: var(--brand-primary);
        }

        .pagination .page-item.disabled .page-link {
            color: #93a19d;
            background: #edf1f0;
        }

        .modal-content {
            overflow: hidden;
            background: var(--surface);
            border-radius: 8px;
        }

        .modal-header.bg-primary {
            padding: 1rem 1.2rem;
            background: var(--brand-primary-dark) !important;
            border-bottom: 0;
        }

        .modal-body {
            padding: 1.3rem;
        }

        .alert {
            border-radius: 8px;
        }

        @media (max-width: 991.98px) {
            .auth-shell {
                grid-template-columns: 1fr;
            }

            .auth-visual {
                min-height: 280px;
            }

            .auth-panel {
                padding: 2rem;
            }

            .sidebar-card {
                position: static !important;
            }
        }

        @media (max-width: 767.98px) {
            .app-navbar {
                min-height: 62px;
                flex-wrap: nowrap;
            }

            .spa-container {
                width: min(100% - 1rem, 100%);
                min-height: calc(100vh - 62px);
                padding-top: 0.75rem;
            }

            .brand-mark {
                width: 36px;
                height: 36px;
                flex-basis: 36px;
            }

            .brand-title {
                font-size: 0.9rem;
            }

            .brand-subtitle {
                display: none;
            }

            .navbar-actions {
                gap: 0.2rem;
            }

            .app-nav-link,
            .nav-link-button {
                width: 38px;
                min-height: 38px;
                justify-content: center;
                padding: 0;
                overflow: hidden;
                font-size: 0;
            }

            .app-nav-link i,
            .nav-link-button i {
                margin: 0 !important;
                font-size: 1rem;
            }

            .user-chip {
                justify-content: center;
                width: 38px;
                max-width: 38px;
                min-height: 38px;
                padding: 0;
                overflow: hidden;
                font-size: 0;
            }

            .user-chip i {
                margin: 0 !important;
                font-size: 1rem;
            }

            .auth-visual {
                min-height: 220px;
                padding: 1.4rem;
                background-position: 55% center;
            }

            .auth-visual h1 {
                font-size: 1.65rem;
            }

            .auth-visual p {
                display: none;
            }

            .auth-panel {
                padding: 1.4rem;
            }

            .auth-heading {
                font-size: 1.4rem;
            }

            .dashboard-header {
                align-items: flex-start;
                flex-direction: column;
                margin: 0.5rem 0 1rem;
            }

            .service-state {
                align-self: flex-start;
            }

            .reports-toolbar {
                align-items: stretch;
                flex-direction: column;
            }

            .dashboard-tabs {
                display: grid;
                grid-template-columns: 1fr 1fr;
                width: 100%;
            }

            .dashboard-tabs .nav-link {
                width: 100%;
                min-width: 0;
                padding: 0.6rem;
                font-size: 0.76rem;
            }

            .toolbar-context {
                display: none;
            }

            .report-card .card-body {
                padding: 1rem;
            }

            .pagination {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark app-navbar sticky-top">
        <div class="container-fluid px-3 px-lg-4 px-xl-5">
            <a class="navbar-brand" href="#dashboard">
                <span class="brand-mark"><i class="bi bi-megaphone-fill"></i></span>
                <span>
                    <span class="brand-title">LAMPUNG TANGGAP</span>
                    <span class="brand-subtitle">Portal Aspirasi Warga</span>
                </span>
            </a>

            <div id="nav-menus" class="navbar-actions ms-auto"></div>
        </div>
    </nav>

    <main class="spa-container" id="app-content"></main>

    <div class="modal fade" id="reportModal" tabindex="-1" aria-labelledby="reportModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="reportModalLabel">
                        <i class="bi bi-pencil-square me-2"></i>Form Laporan
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <div class="modal-body">
                    <form id="reportForm">
                        <input type="hidden" id="reportId">

                        <div class="mb-3">
                            <label for="title" class="form-label">Judul Laporan</label>
                            <input type="text" class="form-control" id="title" placeholder="Masukkan judul laporan">
                        </div>

                        <div class="mb-3">
                            <label for="category" class="form-label">Kategori</label>
                            <input type="text" class="form-control" id="category" placeholder="Contoh: Jalan Rusak, Sampah, Lampu Jalan">
                        </div>

                        <div class="mb-3">
                            <label for="location" class="form-label">Lokasi</label>
                            <input type="text" class="form-control" id="location" placeholder="Kabupaten/kota, kecamatan, dan alamat">
                        </div>

                        <div class="mb-3">
                            <label for="description" class="form-label">Deskripsi</label>
                            <textarea class="form-control" id="description" rows="4" placeholder="Tuliskan detail laporan"></textarea>
                        </div>

                        <div class="d-flex justify-content-end gap-2">
                            <button type="button" class="btn btn-secondary fw-bold" id="btnSaveDraft">
                                <i class="bi bi-save me-1"></i>Simpan Draft
                            </button>
                            <button type="button" class="btn btn-primary fw-bold" id="btnSubmitReport">
                                <i class="bi bi-send-fill me-1"></i>Ajukan
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js?v=20260612"></script>
    <script src="js/auth.js?v=20260612"></script>
    <script src="js/app.js?v=20260612"></script>
    <script src="js/router.js?v=20260612"></script>
</body>
</html>
