name: Deploy Frontend SPA to GitHub Pages

on:
  # Otomatis berjalan setiap kali ada push ke branch main/master.
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact (Hanya Folder Frontend)
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./smartcity_citizen_spa_24782063"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
